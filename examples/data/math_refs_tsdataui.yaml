- name: Station_A__wind_speed_mph__hourly
  expression: _1_wind_speed_hourly_m_s * (2.23694)
  station_id: '1'
  station_name: Station A
  variable: wind_speed_mph
  unit: mph
  interval: hourly
- name: Station_B__precip_cumulative__hourly
  station_id: '2'
  station_name: Station B
  variable: precip_cumulative
  unit: mm
  interval: hourly
  start_year: '2020'
  max_year: '2021'
  expression: cumsum(_2_precipitation_hourly_mm)
- name: wind_diff_A_minus_C__hourly
  expression: _1_wind_speed_hourly_m_s - _3_wind_speed_hourly_m_s
  station_id: '1'
  station_name: Station A
  variable: wind_diff_A_minus_C
  unit: m/s
  interval: hourly
  start_year: '2020'
  max_year: '2021'
