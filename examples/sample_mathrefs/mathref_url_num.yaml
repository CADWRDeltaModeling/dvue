# mathref_url_num.yaml — DEPRECATED
#
# WARNING: url_num is removed. Use source_num instead.
# See mathref_source_num.yaml for the current equivalent.
#
# This file is retained only as a migration reference. The migration shim in
# MathDataCatalogReader will load it with a DeprecationWarning, renaming
# url_num → source_num automatically. Do NOT use this as a template for new
# math ref YAML files — use mathref_source_num.yaml instead.
#
# When two or more files are loaded into the same catalog (e.g. a baseline
# and a scenario run), dvue assigns each source an integer source_num (0, 1, …)
# auto-computed from catalog._source_index[ref.source].
# Math ref search_map criteria filter by source_num to pin a variable to a
# specific source without needing a different attribute in the data itself.
#
# File 0 = baseline run, file 1 = scenario run (same station / variable).

# -- 1. Simple difference: scenario minus baseline ----------------------------
- name: flow_diff__chipps__scenario_minus_baseline
  variable: flow_diff
  unit: cfs
  geoid: '437'
  id: CHAN_437_UP_DIFF
  expression: flow_1.resample('1h').mean() - flow_0.resample('1h').mean()
  search_map:
    flow_0:
      geoid: '437'
      id: CHAN_437_UP
      variable: flow
      unit: ft/s
      url_num: 0
    flow_1:
      geoid: '437'
      id: CHAN_437_UP
      variable: flow
      unit: ft/s
      url_num: 1

# -- 2. Cumulative difference (drift over time) -------------------------------
- name: flow_cumsum_diff__chipps__scenario_minus_baseline
  variable: flow_cumsum_diff
  unit: cfs·hr
  geoid: '437'
  id: CHAN_437_UP_CUMDIFF
  expression: np.cumsum((flow_1.resample('1h').mean() - flow_0.resample('1h').mean()))
  search_map:
    flow_0:
      geoid: '437'
      id: CHAN_437_UP
      variable: flow
      unit: ft/s
      url_num: 0
    flow_1:
      geoid: '437'
      id: CHAN_437_UP
      variable: flow
      unit: ft/s
      url_num: 1

# -- 3. Percent change --------------------------------------------------------
- name: flow_pct_change__chipps__scenario_vs_baseline
  variable: flow_pct_change
  unit: '%'
  geoid: '437'
  id: CHAN_437_UP_PCT
  expression: (flow_1.resample('1h').mean() - flow_0.resample('1h').mean()) / flow_0.resample('1h').mean().abs() * 100
  search_map:
    flow_0:
      geoid: '437'
      id: CHAN_437_UP
      variable: flow
      unit: ft/s
      url_num: 0
    flow_1:
      geoid: '437'
      id: CHAN_437_UP
      variable: flow
      unit: ft/s
      url_num: 1
